<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VS Code Music Player</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="toast-container"></div>

    <div class="player-container">
        <header>
            <h1>My Playlist</h1>
        </header>

        <div class="search-section">
            <input type="text" id="search-input" placeholder="Cari judul lagu atau artis...">
        </div>

        <main class="active-player">
            <div class="cover-wrapper">
                <!-- Cover diganti dengan placeholder estetik bertema musik/abstract -->
                <img src="https://images.unsplash.com/photo-1470225620780-dba8ba36b745?q=80&w=1000&auto=format&fit=crop" id="cover" alt="Cover Album">
            </div>
            
            <div class="song-details">
                <h2 id="title">Memuat Lagu...</h2>
                <p id="artist">Silakan tunggu</p>
            </div>
            
            <div class="audio-wrapper">
                <audio id="audio" controls preload="auto">
                </audio>
            </div>
        </main>

        <div class="upload-section">
            <label for="file-upload" class="custom-file-upload">
                <span class="plus-icon">+</span> Tambah Lagu Baru
            </label>
            <input type="file" id="file-upload" accept="audio/*" multiple style="display:none;">
        </div>

        <section class="playlist" id="playlist">
        </section>
    </div>

    <script src="script.js"></script>
</body>
</html>
